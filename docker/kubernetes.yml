# NEXUS Framework - Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
 name: nexus
 labels:
 app: nexus
spec:
 replicas: 3
 selector:
 matchLabels:
 app: nexus
 template:
 metadata:
 labels:
 app: nexus
 spec:
 containers:
 - name: nexus
 image: nexus-framework:latest
 imagePullPolicy: IfNotPresent
 ports:
 - containerPort: 8000
 name: http
 - containerPort: 9090
 name: metrics
 env:
 - name: NEXUS_PROVIDER
 valueFrom:
 configMapKeyRef:
 name: nexus-config
 key: provider
 - name: NEXUS_API_KEY
 valueFrom:
 secretKeyRef:
 name: nexus-secrets
 key: api-key
 resources:
 requests:
 memory: "256Mi"
 cpu: "250m"
 limits:
 memory: "512Mi"
 cpu: "500m"
 livenessProbe:
 httpGet:
 path: /health
 port: 8000
 initialDelaySeconds: 10
 periodSeconds: 30
 readinessProbe:
 httpGet:
 path: /health
 port: 8000
 initialDelaySeconds: 5
 periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
 name: nexus
spec:
 type: LoadBalancer
 selector:
 app: nexus
 ports:
 - name: http
 port: 80
 targetPort: 8000
 - name: metrics
 port: 9090
 targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
 name: nexus-config
data:
 provider: "openai"
 model: "gpt-4"
---
apiVersion: v1
kind: Secret
metadata:
 name: nexus-secrets
type: Opaque
stringData:
 api-key: "your-api-key-here"